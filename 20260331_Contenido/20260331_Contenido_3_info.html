<!--
Video: youtube.com/shorts/ErhUkY9KbyI

La propiedad background-size en CSS:

Esta propiedad es utilizada para ajustar el tamaño de la imagen de fondo. El valor contain escala la imagen a lo más grande que se puede sin recortes o estiramientos. El valor cover escala la imagen de fondo hasta cubrir todo el elemento body y mantiene su proporción.
-->

<style>
  body {
    background-image: url("https://cdn.pixabay.com/photo/2023/04/12/15/20/cat-7920615_1280.png");
    background-size: contain;
    min-height: 100px;
  }
</style>

<style>
  body {
    background-image: url("https://cdn.pixabay.com/photo/2023/04/12/15/20/cat-7920615_1280.png");
    background-size: cover;
    min-height: 100px;
  }
</style>
