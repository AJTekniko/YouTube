<!--
Video: youtube.com/shorts/V2FVkzd3Eso

La propiedad background-repeat en CSS:

Esta propiedad ajusta la manera en la que la imagen de fondo se repite. El valor no-repeat es utilizada para que la imagen no se repita. Para repetir la imagen horizontalmente, se utiliza el valor repeat-x. Para repetir la imagen verticalmente, se utiliza el valor repeat-y. Considere el ejemplo que ve en pantalla.
-->

<style>
  body {
    background-image: url("https://cdn.pixabay.com/photo/2023/04/12/15/20/cat-7920615_1280.png");
    background-size: contain;
    background-repeat: repeat-y;
    min-height: 100px;
  }
</style>
