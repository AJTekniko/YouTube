<!--
Video: youtube.com/shorts/SvVYW0s-SzA

El gradiente radial en CSS:

Para configurarlo, se utiliza la propiedad background y el valor radial-gradient, en el cual se especifica la forma, el tamaño, la posición, y los colores. Para la forma, se puede usar circle (que significa círculo), o ellipse (que signfica elipse). Para el tamaño se usan las palabras claves closest-side (o lado más cercano), closest-corner (o esquina más cercana), farthest-side (o lado más lejano), y farthest-corner (o esquina más lejana). Para la posición, se pueden usar palabras claves (como center, que signfica centro, top left, que significa arriba a la izquierda, bottom right, que signfica abajo a la derecha), o valores (como porcentajes y píxeles). Considere el ejemplo que ve en pantalla.
-->

<style>
  body {
    background: radial-gradient(circle closest-side at center, red, yellow 50%, green);
    height: 95vh;
  }
</style>
