<!--
Video: youtube.com/shorts/N5O-ysrwT7E

La propiedad margin en CSS:

Esta propiedad controla el espacio entre el borde del elemento y los elementos a su alrededor. Se pueden utilizar de uno a cuatro valores. Con un valor, aplica el mismo espacio a los cuatro lados del elemento. Con dos valores, aplica el primer valor arriba y abajo, y el segundo a la derecha y a la izquierda. Con tres valores, aplica el primer valor arriba, el segundo a la derecha y a la izquierda, y el tercero lo aplica abajo. Con cuatro valores, aplica el primero arriba, el segundo a la derecha, el tercero abajo, y el último a la izquierda.
-->

<head>
  <style>
    p {
      margin: 10px 20px 30px 40px;
    }
  </style>
</head>
<body>
  <span>Párrafo uno</span>
  <p>Párrafo dos</p>
  <span>Párrafo tres</span>
</body>
