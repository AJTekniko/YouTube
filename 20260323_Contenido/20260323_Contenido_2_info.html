<!--
Video: youtube.com/shorts/Sb-dykx-Sq0

Cómo ajustar el espacio en una lista con CSS:

Se puede utilizar la propiedad margin-bottom, que signfica margen inferior, para aplicarle espacio a la parte inferior de cada elemento en una lista. Considera el ejemplo que ve en pantalla. También podemos utilizar la propiedad line-height, que signfica altura de línea, para aplicar espacio entre las líneas de una lista. En el ejemplo que ve en pantalla, la propiedad le aplica un espacio que es dos veces más grande que el tamaño de letra.
-->

<head>
  <style>
    li {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <ul>
    <li>Elemento 1</li>
    <li>Elemento 2</li>
    <li>Elemento 3</li>
  </ul>
</body>


<head>
  <style>
    li {
      line-height: 2;
    }
  </style>
</head>
<body>
  <ul>
    <li>Elemento 1</li>
    <li>Elemento 2</li>
    <li>Elemento 3</li>
  </ul>
</body>
