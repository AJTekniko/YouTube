<!--
Video: youtube.com/shorts/ZJfDxc84WMQ

La propiedad background-attachment en CSS:

Esta propiedad puede hacer que la imagen de fondo permanezca fija por medio del valor fixed, o que se desplace con la página por medio del valor scroll, el valor por defecto. Considere el ejemplo que ve en pantalla.
-->

<style>
  body {
    background-image: url("https://cdn.pixabay.com/photo/2023/04/12/15/20/cat-7920615_1280.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center top;
    background-attachment: fixed;
  }
</style>
