La propiedad border-radius en CSS:

Esta propiedad redondea las esquinas de un borde. Se utiliza en conjunto con la propiedad border. Considere el ejemplo que ve en pantalla.
-->

<style>
  img {
    border: 3px solid gold;
    border-radius: 10px;
    width: 315px;
    height: 315px;
  }
