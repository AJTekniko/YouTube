<!--
Video: youtube.com/shorts/eMtjfylYbEg

Las propiedades list-style en CSS:

Tres propiedades que controlan el estilo de una lista son list-style-type, que define el tipo de viñeta de una lista (como discos, círculos o cuadrados), list-style-position, que ajusta la posición de la viñeta o número de una lista con el valor outside (afuera) y el valor inside (adentro), y list-style-image, que permite utilizar una imagen como el punto de viñeta para la lista. En la pantalla hay un ejemplo de las tres propiedades list-style. Si ningún valor es mencionado para list-style-position, el valor outside es el valor por defecto.
-->

<ul style="list-style-type: circle">
  <li>Elemento 1</li>
  <li>Elemento 2</li>
  <li>Elemento 3</li>
</ul>
<ul style="list-style-position: inside">
  <li>Elemento 1</li>
  <li>Elemento 2</li>
  <li>Elemento 3</li>
</ul>
<ul style="list-style-image: url('aguacate.png');">
  <li>Elemento 1</li>
  <li>Elemento 2</li>
  <li>Elemento 3</li>
</ul>
