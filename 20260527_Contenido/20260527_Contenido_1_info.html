<!--
Video: youtube.com/shorts/BQdeekl8ax0

Las funciones rgb y rgba en CSS:

La función rgb() se basa en el modelo de color RGB. Sus siglas son red (que significa rojo), green (que significa verde), y blue (que significa azul). Si sus tres valores son cero, produce el color negro. Si sus tres valores están a toda intensidad, o sea 255, produce el color blanco. Si solamente uno de sus valores está a toda intensidad, produce el color de la sigla apropiada. Al utilizar diferentes valores, los combina y genera una gran variedad de diferentes colores. La función rgba() tiene el valor alfa. Este cuarto valor determina la transparencia y puede tener un valor entre 0, que representa completa transparencia y 1, que representa completa opacidad. Considere el ejemplo que ve en pantalla.
-->

<style>
  p {
    background-color: rgba(255, 0, 0, 0.5);
  }
</style>
<body>
  <p>Ejemplo</p>
</body>
