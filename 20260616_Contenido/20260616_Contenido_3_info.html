<!--
Video: youtube.com/shorts/qkbgxckrH8E

El desbordamiento en CSS:

Se conoce como overflow en inglés y es la propiedad que le indica a los elementos cómo tratar contenido que excede el tamaño del elemento contenedor. El desbordamiento horizontal es determinado por el eje x, y el vertical por el eje y. También se pueden utilizar las propiedades overflow-x y overflow-y con valores como hidden, scroll, etc. Considere el ejemplo que ve en pantalla.
-->

<style>
  div {
    height: 82px;
    overflow: hidden;
  }
</style>
<div>
  <p>Ejemplo de texto que<br>
    está demasiado largo para<br>
    el contenedor y que quedará<br>
    ocultado con el valor hidden<br>
  </p>
</div>
