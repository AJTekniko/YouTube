<!--
Video: youtube.com/shorts/J66zodQQ6dY

Los códigos hexadecimales en CSS:

Estos códigos son utilizados para configurar el color en el modelo de color RGB. Por ejemplo, un valor de #000000 representa negro y un valor de #FFFFFF representa blanco. El color rojo es representado por los dos primeros caracteres, el color verde por los dos caracteres que siguen, y el azul por los últimos dos caracteres. Cuando el valor de ambos caracteres en cada par es igual, el código hexadecimal se puede abreviar. Considere el ejemplo que ve en pantalla.
-->
  
<style>
  p {
    background-color: #F00;
  }
</style>
<body>
  <p>Ejemplo</p>
</body>
