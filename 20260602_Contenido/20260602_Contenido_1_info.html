<!--
Video: youtube.com/shorts/X9rOW-LjpNg

La función hsl en CSS:

Esta función se basa en el modelo de color HSL. Sus siglas son hue (que significa matiz), saturation (que significa saturación), y lightness (que significa luminosidad). El matiz indica algun color de la rueda de colores, y es representado por un valor de 0 a 360. Cero representa rojo, 120 representa verde, y 240 representa azul. La saturación indica la intensidad del color, y es representado por un valor de 0% (que produce un color desaturado o en escala de grises) a 100% (que produce el color a toda intensidad). La luminosidad indica la claridad u oscuridad del color, y es representado por un valor de 0% a 100%. Un valor de 0% produce negro, 50% produce el tono normal, y 100% produce blanco. Esta función tiene un cuarto parámetro alfa que es opcional y se encuentra después de un diagonal en forma de decimal o porcentaje. Considere el ejemplo que ve en pantalla.
-->

<style>
  p {
    background-color: hsl(0 100% 50% / 0.5);
  }
</style>
<body>
  <p>Ejemplo</p>
</body>
