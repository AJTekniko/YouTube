<!--
Video: youtube.com/shorts/zQd1vTGM7zA

La propiedad padding en CSS:

Esta propiedad controla el espacio dentro de un elemento. Se pueden utilizar de uno a cuatro valores. Con un valor, aplica el mismo espacio a los cuatro lados del elemento. Con dos valores, aplica el primer valor arriba y abajo, y el segundo a la derecha y a la izquierda. Con tres valores, aplica el primer valor arriba, el segundo a la derecha y a la izquierda, y el tercero lo aplica abajo. Con cuatro valores, aplica el primero arriba, el segundo a la derecha, el tercero abajo, y el último a la izquierda.
-->

<head>
  <style>
    p {
      padding: 10px 20px 30px 40px;
      border: 2px solid black;
    }
  </style>
</head>
<body>
  <span>Párrafo uno</span>
  <p>Párrafo dos</p>
  <span>Párrafo tres</span>
</body>
