<!--
Video: youtube.com/shorts/gkkaCrYLJoM

Los diferentes estados de un enlace en CSS:

Los estados de un enlace incluyen link, visited, hover, focus, y active. Se les aplican estilos usando pseudo-classes. Por ejemplo, la pseudo-clase :link cambia el estilo de los enlaces que no han sido visitados, :visited cambia aquellos que ya han sido visitados, :hover cambia el estilo de enlaces cuando el puntero pasa sobre ellos, :focus cambia los enlaces cuando están enfocados, y :active cambia los enlaces cuando están siendo seleccionados con el ratón. El ejemplo que ve en pantalla utiliza la primera pseudo-clase mencionada.
-->

<head>
  <style>
    a:link { 
      color: red;
    }
  </style>
</head>
<body>
  <a href="enlace">Ejemplo</a>
</body>
