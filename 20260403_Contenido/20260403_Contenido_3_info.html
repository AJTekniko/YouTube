<!--
Video: youtube.com/shorts/wQVWxtsVl4w

El gradiente lineal en CSS:

Para configurarlo, se utiliza la propiedad background y el valor linear-gradient, en el cual se especifican los colores y la dirección. Se puede usar un ángulo (como 45deg), una palabra clave (como to right o to left), o un lado/esquina para la dirección. Considere el ejemplo que ve en pantalla.
-->

<style>
  body {
    background: linear-gradient(to right, red, yellow);
  }
</style>
