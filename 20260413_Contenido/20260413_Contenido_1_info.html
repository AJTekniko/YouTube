<!--
Video: youtube.com/shorts/KB2M_rlwMtY

La propiedad border en CSS:

Esta propiedad es utilizada para establecer el ancho, el estilo (como dashed, que significa de rayas, dotted, que significa punteado, o double, que significa doble), y el color del borde. Considere el ejemplo que ve en pantalla.
-->

<style>
  img {
    border-top: 10px solid red;
    border-right: 10px dashed green;
    border-bottom: 10px dotted blue;
    border-left: 10px double purple;
    width: 315px;
    height: 315px;
  }
</style>
<body>
  <img src="https://cdn.pixabay.com/photo/2023/04/12/15/20/cat-7920615_1280.png");
</body>
